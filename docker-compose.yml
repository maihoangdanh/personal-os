x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: personal-os-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3001:3001"
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: personal-os-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    logging: *default-logging
